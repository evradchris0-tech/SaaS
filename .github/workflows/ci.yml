name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint · Typecheck · Test · Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: nkap-core-service
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: nkap
          POSTGRES_PASSWORD: nkap
          POSTGRES_DB: nkap_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U nkap"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      NODE_ENV: test
      DB_HOST: localhost
      DB_PORT: 5432
      DB_USER: nkap
      DB_PASSWORD: nkap
      DB_NAME: nkap_test
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: nkap-core-service/package-lock.json
      - name: Install (clean)
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npx tsc --noEmit -p tsconfig.json
      - name: Test + coverage
        run: npm run test:cov -- --ci
      - name: Build
        run: npm run build
      - name: E2E (base Postgres réelle)
        run: npm run test:e2e
