name: ✨ Fonctionnalité
description: Proposer une fonctionnalité
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problème / besoin
      description: Quel besoin métier ? (lien DECISIONS.md si applicable)
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Solution proposée
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives envisagées
